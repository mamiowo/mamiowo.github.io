<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>學期請假戰情看板</title>
    <style>
        /* iOS Dark Mode & Glassmorphism */
        :root {
            --bg-gradient: linear-gradient(135deg, #1c1c1e 0%, #000000 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #ebebf599;
            --safe-green: #32d74b;
            --warn-yellow: #ffd60a;
            --danger-red: #ff453a;
            --apple-blue: #0a84ff;
            --card-radius: 20px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 15px; /* 手機版邊距稍微縮小 */
            min-height: 100vh;
        }

        h1, h2, h3 { margin-top: 0; font-weight: 600; }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 20px; }
        h2 { font-size: 1.2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 15px;}

        /* 玻璃擬態卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* 戰情看板 */
        .subject-item { margin-bottom: 15px; }
        .subject-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.95rem; }
        .progress-track { background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease, background-color 0.5s ease; }

        /* 表單元素 (手機版最佳化) */
        .alert-box {
            background: rgba(255, 214, 10, 0.15);
            border-left: 4px solid var(--warn-yellow);
            color: #ffea7f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        input[type="date"] {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 15px; /* 加大觸控範圍 */
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 15px;
            color-scheme: dark;
        }
        
        /* 節次選擇網格 (適合手機點擊) */
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 5px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .checkbox-label:active { background: rgba(255, 255, 255, 0.1); }
        .checkbox-label input { margin-right: 6px; transform: scale(1.2); accent-color: var(--apple-blue); }
        
        /* 全選按鈕獨立樣式 */
        .select-all-wrapper { margin-bottom: 15px; }
        .select-all-wrapper .checkbox-label { background: rgba(10, 132, 255, 0.15); font-weight: bold; width: 100%; }

        button.main-btn {
            background: var(--apple-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button.main-btn:active { transform: scale(0.98); opacity: 0.8; }
        
        /* 歷史紀錄區塊 */
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--glass-border);
        }
        .history-item:last-child { border-bottom: none; }
        .history-info strong { font-size: 1rem; display: block; margin-bottom: 4px; }
        .history-info span { font-size: 0.85rem; color: var(--text-muted); }
        .history-actions { display: flex; gap: 10px; }
        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 1rem;
            cursor: pointer;
            color: white;
        }
        .icon-btn.edit { background: rgba(10, 132, 255, 0.2); }
        .icon-btn.delete { background: rgba(255, 69, 58, 0.2); }
    </style>
</head>
<body>

    <h1>📊 缺曠扣打管理</h1>

    <div class="glass-card">
        <h2>即時戰情</h2>
        <div id="subjectsContainer"></div>
    </div>

    <div class="glass-card">
        <h2 id="formTitle">📝 登記請假</h2>
        <div class="alert-box">
            <strong>⚠️ 溫馨提醒：</strong><br>
            僅【事假】與【病假】會計入額度。公假、喪假等請<strong>不要</strong>輸入！
        </div>

        <input type="date" id="leaveDate" min="2026-01-21" max="2026-06-30" required>

        <div class="select-all-wrapper">
            <label class="checkbox-label">
                <input type="checkbox" id="selectAll" onchange="toggleAllPeriods(this)"> 全選 (整天)
            </label>
        </div>
        
        <div class="checkbox-group" id="periodCheckboxes">
            <label class="checkbox-label"><input type="checkbox" class="period-cb" value="1"> 第 1 節</label>
            <label class="checkbox-label"><input type="checkbox" class="period-cb" value="2"> 第 2 節</label>
            <label class="checkbox-label"><input type="checkbox" class="period-cb" value="3"> 第 3 節</label>
            <label class="checkbox-label"><input type="checkbox" class="period-cb" value="4"> 第 4 節</label>
            <label class="checkbox-label"><input type="checkbox" class="period-cb" value="5"> 第 5 節</label>
            <label class="checkbox-label"><input type="checkbox" class="period-cb" value="6"> 第 6 節</label>
            <label class="checkbox-label"><input type="checkbox" class="period-cb" value="7"> 第 7 節</label>
        </div>

        <button class="main-btn" id="submitBtn" onclick="submitLeave()">送出登記</button>
        <button class="main-btn" id="cancelBtn" onclick="cancelEdit()" style="display:none; margin-top:10px; background:rgba(255,255,255,0.2);">取消修改</button>
    </div>

    <div class="glass-card">
        <h2>📅 請假紀錄</h2>
        <div id="historyContainer"></div>
    </div>

    <script>
        const schoolData = {
            "semester": {
                "startDate": "2026-01-21",
                "endDate": "2026-06-30",
                "holidays": ["2026-02-27", "2026-04-03", "2026-04-06", "2026-05-01", "2026-06-19"],
                "oldScheduleDates": ["2026-01-21", "2026-01-22", "2026-01-23", "2026-02-23", "2026-02-24", "2026-02-25", "2026-02-26"]
            },
            "schedules": {
                "old": {
                    "Monday":    { "1": "物理", "2": "健護", "3": "化學", "4": "班會", "5": "體育", "6": "英文", "7": "音樂" },
                    "Tuesday":   { "1": "數學", "2": "音樂", "3": "物理", "4": "英文", "5": "國文", "6": "國文", "7": "英文" },
                    "Wednesday": { "1": "科技應用", "2": "科技應用", "3": "數學", "4": "化學", "5": "物理", "6": "體育", "7": "社團" },
                    "Thursday":  { "1": "數學", "2": "化學", "3": "物理", "4": "國文", "5": "深廣", "6": "深廣", "7": "英文" },
                    "Friday":    { "1": "國文", "2": "化學", "3": "輔導", "4": "輔導", "5": "班會", "6": "國防", "7": "數學" }
                },
                "new": {
                    "Monday":    { "1": "物理", "2": "健護", "3": "化學", "4": "班會", "5": "體育", "6": "音樂", "7": "英文" },
                    "Tuesday":   { "1": "數學", "2": "音樂", "3": "物理", "4": "英文", "5": "國文", "6": "國文", "7": "英文" },
                    "Wednesday": { "1": "科技應用", "2": "科技應用", "3": "數學", "4": "化學", "5": "物理", "6": "體育", "7": "社團" },
                    "Thursday":  { "1": "數學", "2": "化學", "3": "物理", "4": "國文", "5": "深廣", "6": "深廣", "7": "英文" },
                    "Friday":    { "1": "國文", "2": "化學", "3": "輔導", "4": "輔導", "5": "班會", "6": "國防", "7": "數學" }
                }
            },
            "overrides": [
                { "date": "2026-03-03", "period": "1", "newSubject": "物理" },
                { "date": "2026-03-04", "period": "5", "newSubject": "數學" }
            ]
        };

        let dailyScheduleMap = {}; 
        let baseSubjectStats = {};
        let editingIndex = -1; // 用來追蹤目前正在修改哪一筆紀錄

        function generateCalendar() {
            const { semester, schedules, overrides } = schoolData;
            const startDate = new Date(semester.startDate);
            const endDate = new Date(semester.endDate);
            const daysMap = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const overrideMap = {};
            overrides.forEach(ov => overrideMap[`${ov.date}_${ov.period}`] = ov.newSubject);

            baseSubjectStats = {};
            dailyScheduleMap = {};

            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                const dateStr = d.toLocaleDateString('en-CA'); 
                const dayOfWeek = d.getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6 || semester.holidays.includes(dateStr)) continue;

                const isOldSchedule = semester.oldScheduleDates.includes(dateStr);
                const currentSchedule = isOldSchedule ? schedules.old : schedules.new;
                const dailyClasses = currentSchedule[daysMap[dayOfWeek]];

                dailyScheduleMap[dateStr] = {};

                for (let period = 1; period <= 7; period++) {
                    let subject = dailyClasses[period.toString()];
                    const overrideKey = `${dateStr}_${period}`;
                    if (overrideMap[overrideKey]) subject = overrideMap[overrideKey];

                    if (subject) {
                        dailyScheduleMap[dateStr][period] = subject;
                        if (!baseSubjectStats[subject]) {
                            baseSubjectStats[subject] = { totalPeriods: 0, leavesTaken: 0 };
                        }
                        baseSubjectStats[subject].totalPeriods++;
                    }
                }
            }
        }

        function getUserLeaves() {
            return JSON.parse(localStorage.getItem('myLeaves')) || [];
        }

        function saveUserLeaves(leaves) {
            // 排序：讓日期新的排在前面
            leaves.sort((a, b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem('myLeaves', JSON.stringify(leaves));
        }

        function renderDashboard() {
            const userLeaves = getUserLeaves();
            let currentStats = JSON.parse(JSON.stringify(baseSubjectStats));

            userLeaves.forEach(leave => {
                const daySchedule = dailyScheduleMap[leave.date];
                if (daySchedule) {
                    leave.periods.forEach(p => {
                        const subject = daySchedule[p];
                        if (subject && currentStats[subject]) currentStats[subject].leavesTaken++;
                    });
                }
            });

            const container = document.getElementById('subjectsContainer');
            container.innerHTML = '';

            for (const [subject, data] of Object.entries(currentStats)) {
                const threshold = Math.floor(data.totalPeriods / 3);
                const remaining = threshold - data.leavesTaken;
                const percentUsed = (data.leavesTaken / threshold) * 100;

                let colorClass = 'var(--safe-green)';
                if (percentUsed >= 80) colorClass = 'var(--danger-red)';
                else if (percentUsed >= 50) colorClass = 'var(--warn-yellow)';

                const html = `
                    <div class="subject-item">
                        <div class="subject-header">
                            <strong>${subject}</strong>
                            <span>剩 <b>${remaining}</b> 節 (已請 ${data.leavesTaken}/${threshold})</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${Math.min(percentUsed, 100)}%; background-color: ${colorClass};"></div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            }
        }

        function renderHistory() {
            const userLeaves = getUserLeaves();
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';

            if (userLeaves.length === 0) {
                container.innerHTML = '<div style="text-align:center; color: var(--text-muted); padding: 10px;">尚無請假紀錄</div>';
                return;
            }

            userLeaves.forEach((leave, index) => {
                // 將陣列數字排序，看起來比較整齊
                const sortedPeriods = [...leave.periods].sort((a, b) => a - b);
                container.innerHTML += `
                    <div class="history-item">
                        <div class="history-info">
                            <strong>${leave.date}</strong>
                            <span>第 ${sortedPeriods.join(', ')} 節</span>
                        </div>
                        <div class="history-actions">
                            <button class="icon-btn edit" onclick="editLeave(${index})">✏️</button>
                            <button class="icon-btn delete" onclick="deleteLeave(${index})">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        function toggleAllPeriods(checkbox) {
            const cbs = document.querySelectorAll('.period-cb');
            cbs.forEach(cb => cb.checked = checkbox.checked);
        }

        function submitLeave() {
            const dateInput = document.getElementById('leaveDate').value;
            if (!dateInput) return alert("請選擇日期！");

            const selectedPeriods = Array.from(document.querySelectorAll('.period-cb:checked')).map(cb => cb.value);
            if (selectedPeriods.length === 0) return alert("請至少勾選一節課！");

            let userLeaves = getUserLeaves();

            if (editingIndex > -1) {
                // 更新模式
                userLeaves[editingIndex] = { date: dateInput, periods: selectedPeriods };
                editingIndex = -1; // 結束編輯狀態
                document.getElementById('formTitle').innerText = '📝 登記請假';
                document.getElementById('submitBtn').innerText = '送出登記';
                document.getElementById('cancelBtn').style.display = 'none';
                alert("✅ 修改成功！");
            } else {
                // 新增模式
                userLeaves.push({ date: dateInput, periods: selectedPeriods });
                alert("✅ 登記成功！");
            }

            saveUserLeaves(userLeaves);
            resetForm();
            updateAll();
        }

        function deleteLeave(index) {
            if (!confirm("確定要刪除這筆請假紀錄嗎？")) return;
            let userLeaves = getUserLeaves();
            userLeaves.splice(index, 1);
            saveUserLeaves(userLeaves);
            updateAll();
        }

        function editLeave(index) {
            const userLeaves = getUserLeaves();
            const leave = userLeaves[index];
            
            // 填入表單
            document.getElementById('leaveDate').value = leave.date;
            const cbs = document.querySelectorAll('.period-cb');
            cbs.forEach(cb => {
                cb.checked = leave.periods.includes(cb.value);
            });
            
            // 檢查全選框狀態
            document.getElementById('selectAll').checked = leave.periods.length === 7;

            // 切換為編輯模式介面
            editingIndex = index;
            document.getElementById('formTitle').innerText = '✏️ 修改紀錄';
            document.getElementById('submitBtn').innerText = '儲存修改';
            document.getElementById('cancelBtn').style.display = 'block';

            // 滾動到表單區
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingIndex = -1;
            document.getElementById('formTitle').innerText = '📝 登記請假';
            document.getElementById('submitBtn').innerText = '送出登記';
            document.getElementById('cancelBtn').style.display = 'none';
            resetForm();
        }

        function resetForm() {
            const today = new Date().toLocaleDateString('en-CA');
            document.getElementById('leaveDate').value = today;
            document.getElementById('selectAll').checked = false;
            const cbs = document.querySelectorAll('.period-cb');
            cbs.forEach(cb => cb.checked = false);
        }

        function updateAll() {
            renderDashboard();
            renderHistory();
        }

        window.onload = () => {
            resetForm();
            generateCalendar();
            updateAll();
        };
    </script>
</body>
</html>
