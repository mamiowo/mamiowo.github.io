<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>學期缺曠管理系統</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1c1c1e 0%, #000000 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #ebebf599;
            --safe-green: #32d74b;
            --warn-yellow: #ffd60a;
            --danger-red: #ff453a;
            --apple-blue: #0a84ff;
            --sick-color: #5e5ce6;
            --personal-color: #ff9f0a;
            --card-radius: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden; /* 桌面版禁止整頁滾動 */
        }

        h2, h3 { margin-top: 0; font-weight: 600; font-size: 1.2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 15px; }

        /* 儀表板網格排版 (桌面版) */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .left-column {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .right-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }

        /* 玻璃擬態卡片與自訂滾動條 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .scrollable-content {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 10px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        /* 戰情看板 */
        .subject-item { margin-bottom: 15px; }
        .subject-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.95rem; }
        .progress-track { background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease, background-color 0.5s ease; }

        /* 圓餅圖區塊 */
        .chart-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 10px 0;
        }
        .pie-chart {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(var(--text-muted) 0% 100%);
            transition: background 0.5s;
        }
        .chart-legend { display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; }

        /* 表單元素 */
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        
        input[type="date"], select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            font-size: 0.95rem;
            color-scheme: dark;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
            margin-bottom: 15px;
        }
        .checkbox-label {
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 5px; border-radius: 8px; cursor: pointer;
            border: 1px solid transparent; font-size: 0.85rem; transition: 0.2s;
        }
        .checkbox-label:active { background: rgba(255, 255, 255, 0.1); }
        .checkbox-label input { margin-right: 4px; }
        
        .select-all-wrapper .checkbox-label { background: rgba(10, 132, 255, 0.15); width: 100%; margin-bottom: 10px;}

        button.main-btn {
            background: var(--apple-blue); color: white; border: none; padding: 12px;
            border-radius: 8px; width: 100%; font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        button.main-btn:active { transform: scale(0.98); opacity: 0.8; }

        /* 歷史紀錄 */
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--glass-border);
        }
        .history-item:last-child { border-bottom: none; }
        .history-info strong { font-size: 0.95rem; display: block; margin-bottom: 4px; }
        .history-info span { font-size: 0.8rem; color: var(--text-muted); }
        .history-actions { display: flex; gap: 8px; }
        .text-btn {
            background: rgba(255,255,255,0.1); border: none; border-radius: 6px;
            padding: 5px 10px; font-size: 0.8rem; cursor: pointer; color: white;
        }
        .text-btn.edit { background: rgba(10, 132, 255, 0.2); color: #82c0ff; }
        .text-btn.delete { background: rgba(255, 69, 58, 0.2); color: #ff918c; }

        /* 手機版響應式設定 */
        @media (max-width: 768px) {
            body { height: auto; overflow: auto; }
            .dashboard-layout { grid-template-columns: 1fr; height: auto; display: flex; flex-direction: column; }
            .left-column, .right-column { overflow: visible; }
            .glass-card { flex-grow: 0; }
            .scrollable-content { overflow-y: visible; max-height: none; }
        }
    </style>
</head>
<body>

    <div class="dashboard-layout">
        <div class="left-column">
            <div class="glass-card" style="height: 100%;">
                <h2>即時戰情分析</h2>
                <div class="scrollable-content" id="subjectsContainer">
                    </div>
            </div>
        </div>

        <div class="right-column">
            
            <div class="glass-card" style="flex-shrink: 0;">
                <h2>假別統計比例</h2>
                <div class="chart-container">
                    <div class="pie-chart" id="pieChart"></div>
                    <div class="chart-legend">
                        <div class="legend-item">
                            <div class="legend-color" style="background: var(--personal-color);"></div>
                            <span id="personalCount">事假: 0 節</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: var(--sick-color);"></div>
                            <span id="sickCount">病假: 0 節</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card" style="flex-shrink: 0;">
                <h2 id="formTitle">登記請假紀錄</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="leaveDate" min="2026-01-21" max="2026-06-30" required>
                    </div>
                    <div class="form-group">
                        <label>假別</label>
                        <select id="leaveType">
                            <option value="事假">事假</option>
                            <option value="病假">病假</option>
                        </select>
                    </div>
                </div>

                <div class="select-all-wrapper">
                    <label class="checkbox-label">
                        <input type="checkbox" id="selectAll" onchange="toggleAllPeriods(this)"> 全選 (整天)
                    </label>
                </div>
                
                <div class="checkbox-group" id="periodCheckboxes">
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="1"> 第 1 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="2"> 第 2 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="3"> 第 3 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="4"> 第 4 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="5"> 第 5 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="6"> 第 6 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="7"> 第 7 節</label>
                </div>

                <button class="main-btn" id="submitBtn" onclick="submitLeave()">送出資料</button>
                <button class="main-btn" id="cancelBtn" onclick="cancelEdit()" style="display:none; margin-top:10px; background:rgba(255,255,255,0.2);">取消修改</button>
            </div>

            <div class="glass-card" style="flex-grow: 1; overflow: hidden;">
                <h2>歷史紀錄</h2>
                <div class="scrollable-content" id="historyContainer">
                    </div>
            </div>

        </div>
    </div>

    <script>
        const schoolData = {
            "semester": {
                "startDate": "2026-01-21",
                "endDate": "2026-06-30",
                "holidays": ["2026-02-27", "2026-04-03", "2026-04-06", "2026-05-01", "2026-06-19"],
                "oldScheduleDates": ["2026-01-21", "2026-01-22", "2026-01-23", "2026-02-23", "2026-02-24", "2026-02-25", "2026-02-26"]
            },
            "schedules": {
                "old": {
                    "Monday":    { "1": "物理", "2": "健護", "3": "化學", "4": "班會", "5": "體育", "6": "英文", "7": "音樂" },
                    "Tuesday":   { "1": "數學", "2": "音樂", "3": "物理", "4": "英文", "5": "國文", "6": "國文", "7": "英文" },
                    "Wednesday": { "1": "科技應用", "2": "科技應用", "3": "數學", "4": "化學", "5": "物理", "6": "體育", "7": "社團" },
                    "Thursday":  { "1": "數學", "2": "化學", "3": "物理", "4": "國文", "5": "深廣", "6": "深廣", "7": "英文" },
                    "Friday":    { "1": "國文", "2": "化學", "3": "輔導", "4": "輔導", "5": "班會", "6": "國防", "7": "數學" }
                },
                "new": {
                    "Monday":    { "1": "物理", "2": "健護", "3": "化學", "4": "班會", "5": "體育", "6": "音樂", "7": "英文" },
                    "Tuesday":   { "1": "數學", "2": "音樂", "3": "物理", "4": "英文", "5": "國文", "6": "國文", "7": "英文" },
                    "Wednesday": { "1": "科技應用", "2": "科技應用", "3": "數學", "4": "化學", "5": "物理", "6": "體育", "7": "社團" },
                    "Thursday":  { "1": "數學", "2": "化學", "3": "物理", "4": "國文", "5": "深廣", "6": "深廣", "7": "英文" },
                    "Friday":    { "1": "國文", "2": "化學", "3": "輔導", "4": "輔導", "5": "班會", "6": "國防", "7": "數學" }
                }
            },
            "overrides": [
                { "date": "2026-03-03", "period": "1", "newSubject": "物理" },
                { "date": "2026-03-04", "period": "5", "newSubject": "數學" }
            ]
        };

        let dailyScheduleMap = {}; 
        let baseSubjectStats = {};
        let editingIndex = -1;

        function generateCalendar() {
            const { semester, schedules, overrides } = schoolData;
            const startDate = new Date(semester.startDate);
            const endDate = new Date(semester.endDate);
            const daysMap = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const overrideMap = {};
            overrides.forEach(ov => overrideMap[`${ov.date}_${ov.period}`] = ov.newSubject);

            baseSubjectStats = {};
            dailyScheduleMap = {};

            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                const dateStr = d.toLocaleDateString('en-CA'); 
                const dayOfWeek = d.getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6 || semester.holidays.includes(dateStr)) continue;

                const isOldSchedule = semester.oldScheduleDates.includes(dateStr);
                const currentSchedule = isOldSchedule ? schedules.old : schedules.new;
                const dailyClasses = currentSchedule[daysMap[dayOfWeek]];

                dailyScheduleMap[dateStr] = {};

                for (let period = 1; period <= 7; period++) {
                    let subject = dailyClasses[period.toString()];
                    const overrideKey = `${dateStr}_${period}`;
                    if (overrideMap[overrideKey]) subject = overrideMap[overrideKey];

                    if (subject) {
                        dailyScheduleMap[dateStr][period] = subject;
                        if (!baseSubjectStats[subject]) {
                            baseSubjectStats[subject] = { totalPeriods: 0, leavesTaken: 0 };
                        }
                        baseSubjectStats[subject].totalPeriods++;
                    }
                }
            }
        }

        function getUserLeaves() {
            return JSON.parse(localStorage.getItem('myLeavesV2')) || [];
        }

        function saveUserLeaves(leaves) {
            leaves.sort((a, b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem('myLeavesV2', JSON.stringify(leaves));
        }

        function updateChartAndStats(userLeaves) {
            let personalCount = 0;
            let sickCount = 0;

            userLeaves.forEach(leave => {
                // 如果舊資料沒有 type 屬性，預設歸類為事假
                const type = leave.type || '事假';
                if (type === '事假') personalCount += leave.periods.length;
                else if (type === '病假') sickCount += leave.periods.length;
            });

            document.getElementById('personalCount').innerText = `事假: ${personalCount} 節`;
            document.getElementById('sickCount').innerText = `病假: ${sickCount} 節`;

            const total = personalCount + sickCount;
            const chart = document.getElementById('pieChart');
            
            if (total === 0) {
                chart.style.background = 'var(--glass-border)';
            } else {
                const personalPct = (personalCount / total) * 100;
                chart.style.background = `conic-gradient(var(--personal-color) 0% ${personalPct}%, var(--sick-color) ${personalPct}% 100%)`;
            }
        }

        function renderDashboard() {
            const userLeaves = getUserLeaves();
            let currentStats = JSON.parse(JSON.stringify(baseSubjectStats));
            let totalLeavesAny = 0;

            userLeaves.forEach(leave => {
                const daySchedule = dailyScheduleMap[leave.date];
                if (daySchedule) {
                    leave.periods.forEach(p => {
                        const subject = daySchedule[p];
                        if (subject && currentStats[subject]) {
                            currentStats[subject].leavesTaken++;
                            totalLeavesAny++;
                        }
                    });
                }
            });

            // 將物件轉為陣列以便排序
            let statsArray = Object.keys(currentStats).map(subject => {
                const data = currentStats[subject];
                const threshold = Math.floor(data.totalPeriods / 3);
                const remaining = threshold - data.leavesTaken;
                const percentUsed = threshold > 0 ? (data.leavesTaken / threshold) * 100 : 0;
                return { subject, totalPeriods: data.totalPeriods, threshold, leavesTaken: data.leavesTaken, remaining, percentUsed };
            });

            // 動態排序邏輯
            if (totalLeavesAny === 0) {
                // 沒有請假時，總節數由大到小
                statsArray.sort((a, b) => b.totalPeriods - a.totalPeriods);
            } else {
                // 有請假時，危險度由大到小 (百分比高 -> 剩餘節數少 -> 總節數多)
                statsArray.sort((a, b) => {
                    if (b.percentUsed !== a.percentUsed) return b.percentUsed - a.percentUsed;
                    if (a.remaining !== b.remaining) return a.remaining - b.remaining;
                    return b.totalPeriods - a.totalPeriods;
                });
            }

            const container = document.getElementById('subjectsContainer');
            container.innerHTML = '';

            statsArray.forEach(data => {
                let colorClass = 'var(--safe-green)';
                if (data.percentUsed >= 80) colorClass = 'var(--danger-red)';
                else if (data.percentUsed >= 50) colorClass = 'var(--warn-yellow)';

                const html = `
                    <div class="subject-item">
                        <div class="subject-header">
                            <strong>${data.subject}</strong>
                            <span>剩 <b>${data.remaining}</b> 節 (已用 ${data.leavesTaken}/${data.threshold})</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${Math.min(data.percentUsed, 100)}%; background-color: ${colorClass};"></div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function renderHistory() {
            const userLeaves = getUserLeaves();
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';

            if (userLeaves.length === 0) {
                container.innerHTML = '<div style="text-align:center; color: var(--text-muted); padding: 10px;">目前無資料</div>';
                return;
            }

            userLeaves.forEach((leave, index) => {
                const sortedPeriods = [...leave.periods].sort((a, b) => a - b);
                const typeText = leave.type || '事假';
                const typeColor = typeText === '事假' ? 'var(--personal-color)' : 'var(--sick-color)';

                container.innerHTML += `
                    <div class="history-item">
                        <div class="history-info">
                            <strong>${leave.date} <span style="font-size:0.8rem; color:${typeColor}; border:1px solid ${typeColor}; padding:2px 4px; border-radius:4px; margin-left:5px;">${typeText}</span></strong>
                            <span>第 ${sortedPeriods.join(', ')} 節</span>
                        </div>
                        <div class="history-actions">
                            <button class="text-btn edit" onclick="editLeave(${index})">修改</button>
                            <button class="text-btn delete" onclick="deleteLeave(${index})">刪除</button>
                        </div>
                    </div>
                `;
            });
        }

        function toggleAllPeriods(checkbox) {
            const cbs = document.querySelectorAll('.period-cb');
            cbs.forEach(cb => cb.checked = checkbox.checked);
        }

        function submitLeave() {
            const dateInput = document.getElementById('leaveDate').value;
            const typeInput = document.getElementById('leaveType').value;

            if (!dateInput) return alert("請選擇日期");

            const selectedPeriods = Array.from(document.querySelectorAll('.period-cb:checked')).map(cb => parseInt(cb.value));
            if (selectedPeriods.length === 0) return alert("請至少勾選一節課");

            let userLeaves = getUserLeaves();

            if (editingIndex > -1) {
                userLeaves[editingIndex] = { date: dateInput, type: typeInput, periods: selectedPeriods };
                editingIndex = -1;
                document.getElementById('formTitle').innerText = '登記請假紀錄';
                document.getElementById('submitBtn').innerText = '送出資料';
                document.getElementById('cancelBtn').style.display = 'none';
            } else {
                userLeaves.push({ date: dateInput, type: typeInput, periods: selectedPeriods });
            }

            saveUserLeaves(userLeaves);
            resetForm();
            updateAll();
        }

        function deleteLeave(index) {
            if (!confirm("確定要刪除這筆紀錄嗎？")) return;
            let userLeaves = getUserLeaves();
            userLeaves.splice(index, 1);
            saveUserLeaves(userLeaves);
            updateAll();
        }

        function editLeave(index) {
            const userLeaves = getUserLeaves();
            const leave = userLeaves[index];
            
            document.getElementById('leaveDate').value = leave.date;
            document.getElementById('leaveType').value = leave.type || '事假';
            
            const cbs = document.querySelectorAll('.period-cb');
            cbs.forEach(cb => { cb.checked = leave.periods.includes(parseInt(cb.value)); });
            
            document.getElementById('selectAll').checked = leave.periods.length === 7;

            editingIndex = index;
            document.getElementById('formTitle').innerText = '修改紀錄';
            document.getElementById('submitBtn').innerText = '儲存修改';
            document.getElementById('cancelBtn').style.display = 'block';
        }

        function cancelEdit() {
            editingIndex = -1;
            document.getElementById('formTitle').innerText = '登記請假紀錄';
            document.getElementById('submitBtn').innerText = '送出資料';
            document.getElementById('cancelBtn').style.display = 'none';
            resetForm();
        }

        function resetForm() {
            const today = new Date().toLocaleDateString('en-CA');
            document.getElementById('leaveDate').value = today;
            document.getElementById('leaveType').value = '事假';
            document.getElementById('selectAll').checked = false;
            const cbs = document.querySelectorAll('.period-cb');
            cbs.forEach(cb => cb.checked = false);
        }

        function updateAll() {
            const userLeaves = getUserLeaves();
            renderDashboard();
            renderHistory();
            updateChartAndStats(userLeaves);
        }

        window.onload = () => {
            resetForm();
            generateCalendar();
            updateAll();
        };
    </script>
</body>
</html>
