<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>學期缺曠管理系統 V14.0</title>
    <style>
        :root {
            /* 全域色票變數 (莫蘭迪色系) */
            --c-slate: #7A989A; /* 灰藍綠：主色調/病假 */
            --c-sage:  #849271; /* 鼠尾草綠：安全狀態 */
            --c-sand:  #C1AE8D; /* 沙褐色：事假/分隔線 */
            --c-ochre: #CF9546; /* 赭黃色：警告狀態 */
            --c-rust:  #C67052; /* 鐵鏽紅：危險狀態 */

            /* --- 明亮色調 (莫蘭迪白) --- */
            --bg-gradient: linear-gradient(135deg, #FDFBF7 0%, #F4F0EA 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --solid-bg: #ffffff; /* 放大課表時的實體背景 */
            --glass-border: rgba(193, 174, 141, 0.4);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            
            --text-main: #2C3333;
            --text-muted: #6B7271;
            
            --input-bg: #ffffff;
            --checkbox-bg: #FDFBF7;
            --checkbox-border: rgba(193, 174, 141, 0.5);
            --text-btn-bg: #FDFBF7;
            --progress-track-bg: #EAE5DE;
        }

        /* --- 深色色調 (莫蘭迪黑) 預設套用 --- */
        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #222422 0%, #151615 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --solid-bg: #1e1f1e; /* 深色模式下的實體背景 */
            --glass-border: rgba(193, 174, 141, 0.2);
            --card-shadow: 0 4px 24px 0 rgba(0, 0, 0, 0.4);
            
            --text-main: #f4f0ea;
            --text-muted: rgba(193, 174, 141, 0.75);
            
            --input-bg: rgba(0, 0, 0, 0.2);
            --checkbox-bg: rgba(0, 0, 0, 0.15);
            --checkbox-border: var(--glass-border);
            --text-btn-bg: rgba(0,0,0,0.2);
            --progress-track-bg: rgba(0, 0, 0, 0.3);
        }

        /* 統一變數映射 */
        :root, body.dark-mode {
            --safe-green: var(--c-sage);
            --warn-yellow: var(--c-ochre);
            --danger-red: var(--c-rust);
            --primary-color: var(--c-slate);
            --sick-color: var(--c-slate);
            --personal-color: var(--c-sand);
            --card-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        h2, h3 { 
            margin-top: 0; 
            font-weight: 600; 
            font-size: 1.05rem; 
            letter-spacing: 1px; 
            color: var(--primary-color); 
        }

        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--glass-border);
            padding-bottom: 8px; margin-bottom: 12px;
        }
        .section-header h2 { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        .dashboard-layout {
            display: flex;
            gap: 15px;
            height: calc(100vh - 30px);
        }

        .col-left { display: flex; flex-direction: column; width: 300px; gap: 12px; flex-shrink: 0; }
        .col-main { display: flex; flex-direction: column; flex: 1; gap: 15px; min-width: 300px; }
        .col-right { display: flex; flex-direction: column; width: 320px; gap: 15px; flex-shrink: 0; }

        .scrollable-content { overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(193, 174, 141, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--c-sand); }

        .time-block { text-align: center; justify-content: center; padding: 20px 15px; flex-shrink: 0; }
        .time-clock { font-size: 2.8rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 5px; font-variant-numeric: tabular-nums; color: var(--primary-color); }
        .time-date { font-size: 0.85rem; color: var(--text-muted); letter-spacing: 1px; font-weight: 500; }
        
        .version-tag {
            position: absolute; top: 10px; right: 12px;
            font-size: 0.75rem; color: var(--c-sand); font-weight: bold;
        }

        .mode-toggle {
            position: fixed; top: 15px; right: 15px; z-index: 1000;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--primary-color); padding: 8px 12px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer; letter-spacing: 1px;
            box-shadow: var(--card-shadow); transition: all 0.2s;
        }
        .mode-toggle:hover { border-color: var(--c-sand); }
        body.dark-mode .mode-toggle::after { content: " (DARK)"; }
        body:not(.dark-mode) .mode-toggle::after { content: " (LIGHT)"; }

        .override-history { max-height: 140px; flex-shrink: 0; padding-bottom: 5px; overflow: hidden; }
        .override-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed var(--glass-border); font-size: 0.85rem; color: var(--text-muted); }
        .override-item:last-child { border-bottom: none; }
        .override-item strong { color: var(--c-ochre); font-weight: 600; }

        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-group { flex: 1; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 500;}
        
        input[type="date"], select {
            background: var(--input-bg); border: 1px solid var(--c-sand);
            color: var(--text-main); padding: 8px; border-radius: 6px; width: 100%;
            box-sizing: border-box; font-size: 0.9rem; color-scheme: light; outline: none; transition: 0.2s;
        }
        body.dark-mode input[type="date"], body.dark-mode select { color-scheme: dark; }
        input[type="date"]:focus, select:focus { border-color: var(--primary-color); box-shadow: 0 0 5px rgba(122, 152, 154, 0.3); }

        .select-all-wrapper { margin-bottom: 8px; }
        
        .checkbox-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; flex-grow: 1; justify-content: stretch; }
        .checkbox-label {
            display: flex; align-items: center; justify-content: center;
            background: var(--checkbox-bg); padding: 7px; border-radius: 6px;
            cursor: pointer; border: 1px solid var(--checkbox-border); font-size: 0.9rem; 
            transition: all 0.2s ease; flex-grow: 1; letter-spacing: 1px; color: var(--text-muted);
        }
        .checkbox-label:hover { border-color: var(--c-sand); color: var(--text-main); }
        .checkbox-label input { display: none; }
        .checkbox-label:has(input:checked) {
            background: var(--safe-green); color: #ffffff; font-weight: 600;
            border-color: var(--safe-green); box-shadow: 0 2px 8px rgba(132, 146, 113, 0.4);
        }

        button.main-btn {
            background: var(--primary-color); color: #ffffff; border: none; padding: 10px;
            border-radius: 8px; width: 100%; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.2s; letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(122, 152, 154, 0.3);
        }
        button.main-btn:active { transform: scale(0.98); opacity: 0.9; }

        .history-item { 
            display: flex; flex-direction: column; gap: 10px;
            padding: 14px; margin-bottom: 10px;
            background: var(--input-bg);
            border: 1px solid rgba(193, 174, 141, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .history-item:hover { border-color: var(--c-sand); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .history-item.selected {
            background: rgba(122, 152, 154, 0.08);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 1px var(--primary-color);
        }

        .history-header { display: flex; justify-content: space-between; align-items: center; }
        .history-title { font-size: 1rem; font-weight: 600; display: flex; align-items: center; color: var(--text-main); }
        .history-periods { display: flex; flex-wrap: wrap; gap: 6px; }
        
        .period-badge { 
            background: rgba(193, 174, 141, 0.1); border: 1px solid rgba(193, 174, 141, 0.5); 
            padding: 4px 12px; border-radius: 6px; font-size: 0.85rem; color: var(--text-muted); font-weight: 500;
        }

        .history-actions { display: flex; gap: 8px; }
        .text-btn { background: var(--text-btn-bg); border: 1px solid rgba(193, 174, 141, 0.3); border-radius: 6px; padding: 5px 10px; font-size: 0.8rem; cursor: pointer; color: var(--text-muted); transition: 0.2s; font-weight: 500; }
        .text-btn.edit { color: var(--primary-color); border-color: rgba(122, 152, 154, 0.3); background: rgba(122, 152, 154, 0.05); }
        .text-btn.delete { color: var(--danger-red); border-color: rgba(198, 112, 82, 0.3); background: rgba(198, 112, 82, 0.05); }
        .tag { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: 600; }

        .batch-actions { display: flex; align-items: center; gap: 12px; }
        .batch-actions label { font-size: 0.85rem; display: flex; align-items: center; gap: 4px; cursor: pointer; color: var(--text-muted); font-weight: 500; }
        .batch-actions input[type="checkbox"] { transform: scale(1.1); accent-color: var(--primary-color); }

        .empty-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; text-align: center; color: var(--text-muted); padding: 0 30px;
        }
        .empty-state-title { font-size: 1.5rem; font-weight: 600; color: var(--primary-color); margin-bottom: 15px; }
        .empty-state-desc { font-size: 0.95rem; line-height: 1.6; background: var(--input-bg); padding: 20px; border-radius: 12px; border: 1px dashed var(--c-sand); text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        
        .highlight-danger { color: var(--danger-red); font-weight: 700; font-size: 1.1em; }

        /* 課表放大效果 - 使用實體背景 var(--solid-bg) */
        .mini-schedule-wrapper { position: relative; cursor: zoom-in; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s ease; transform-origin: top right; z-index: 10; }
        .mini-schedule-wrapper:hover { transform: scale(2.2) translateX(-10px); z-index: 100; background: var(--solid-bg); box-shadow: -10px 10px 40px rgba(0,0,0,0.25); cursor: default; }
        .schedule-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.65rem; color: var(--text-main); }
        .schedule-table th, .schedule-table td { border: 1px solid var(--glass-border); padding: 3px 1px; }
        .schedule-table th { color: var(--c-slate); font-weight: 600; background: rgba(122, 152, 154, 0.1); }
        
        .chart-container { display: flex; flex-direction: row; align-items: center; justify-content: space-around; padding: 10px 5px; }
        .pie-chart { width: 100px; height: 100px; border-radius: 50%; background: conic-gradient(var(--progress-track-bg) 0% 100%); box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        .chart-legend { display: flex; flex-direction: column; gap: 12px; font-size: 0.85rem; font-weight: 500;}
        .legend-item { display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; }

        .subject-item { margin-bottom: 12px; }
        .subject-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.85rem; color: var(--text-muted); font-weight: 500;}
        .subject-header strong { color: var(--text-main); font-weight: 600; }
        .progress-track { background: var(--progress-track-bg); border-radius: 6px; height: 6px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        .progress-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease-out, background-color 0.5s ease; }

        /* --- 手機版排版大升級 --- */
        @media (max-width: 900px) {
            body { 
                height: auto; 
                overflow: auto; 
                padding: 10px; 
                padding-top: 55px; /* 留出空間給右上角的切換按鈕 */
            }
            .dashboard-layout { flex-direction: column; height: auto; gap: 20px; }
            .col-left, .col-right, .col-main { width: 100%; min-width: 100%; }
            .scrollable-content { overflow-y: visible; max-height: none; }
            .mini-schedule-wrapper:hover { transform: scale(1); box-shadow: none; cursor: default; background: var(--glass-bg); }
            .override-history { max-height: none; }
            
            .mode-toggle { top: 10px; right: 10px; padding: 8px 12px; font-size: 0.85rem; }
            .time-clock { font-size: 2.2rem; }
            
            /* 節次選擇改為雙欄網格，加大點擊區域 */
            .checkbox-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .checkbox-label { padding: 12px 10px; font-size: 1rem; }
            .checkbox-group .checkbox-label:last-child { grid-column: span 2; } /* 第7節橫跨兩欄 */

            /* 歷史紀錄卡片重排 */
            .history-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .history-actions { width: 100%; justify-content: flex-end; border-top: 1px solid var(--glass-border); padding-top: 8px; margin-top: 4px; }
        }
    </style>
</head>
<body class="dark-mode"> <button class="mode-toggle" id="modeToggle">MODE</button>

    <div class="dashboard-layout">
        
        <div class="col-left">
            <div class="glass-card time-block">
                <div class="version-tag">V14.0</div>
                <div class="time-clock" id="realTimeClock">00:00:00</div>
                <div class="time-date" id="realTimeDate">載入日期中...</div>
            </div>

            <div class="glass-card override-history">
                <div class="section-header">
                    <h2>調課歷史</h2>
                </div>
                <div class="scrollable-content" id="overridesContainer"></div>
            </div>

            <div class="glass-card" style="flex-grow: 1;">
                <div class="section-header">
                    <h2 id="formTitle">登記請假紀錄</h2>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>日期</label><input type="date" id="leaveDate" min="2026-01-21" max="2026-06-30" required></div>
                    <div class="form-group"><label>假別</label><select id="leaveType"><option value="事假">事假</option><option value="病假">病假</option></select></div>
                </div>
                
                <div class="select-all-wrapper">
                    <label class="checkbox-label" style="background: rgba(122, 152, 154, 0.1); border-color: rgba(122, 152, 154, 0.3); color: var(--primary-color); font-weight: 600;">
                        <input type="checkbox" id="selectAll" onchange="toggleAllPeriods(this)"> 全天選取
                    </label>
                </div>
                
                <div class="checkbox-group" id="periodCheckboxes">
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="1"> 第 1 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="2"> 第 2 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="3"> 第 3 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="4"> 第 4 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="5"> 第 5 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="6"> 第 6 節</label>
                    <label class="checkbox-label"><input type="checkbox" class="period-cb" value="7"> 第 7 節</label>
                </div>
                
                <div style="margin-top: auto;">
                    <button class="main-btn" id="submitBtn" onclick="submitLeave()">送出資料</button>
                    <button class="main-btn" id="cancelBtn" onclick="cancelEdit()" style="display:none; margin-top:8px; background: rgba(193, 174, 141, 0.15); color: var(--text-muted); box-shadow: none;">取消修改</button>
                </div>
            </div>
        </div>

        <div class="col-main">
            <div class="glass-card" style="height: 100%;">
                <div class="section-header">
                    <h2>登記歷史</h2>
                    <div class="batch-actions" id="batchActions" style="display: none;">
                        <label>
                            <input type="checkbox" id="selectAllHistory" onchange="toggleAllHistory(this)"> <span>全選</span>
                        </label>
                        <button class="text-btn delete" onclick="deleteSelectedHistory()">刪除選取</button>
                    </div>
                </div>
                <div class="scrollable-content" id="historyContainer"></div>
            </div>
        </div>

        <div class="col-right">
            <div class="glass-card mini-schedule-wrapper">
                <div class="section-header"><h2>當前課表</h2></div>
                <table class="schedule-table">
                    <tr><th>節</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th></tr>
                    <tr><td>1</td><td>物理</td><td>數學</td><td>科技</td><td>數學</td><td>國文</td></tr>
                    <tr><td>2</td><td>健護</td><td>音樂</td><td>科技</td><td>化學</td><td>化學</td></tr>
                    <tr><td>3</td><td>化學</td><td>物理</td><td>數學</td><td>物理</td><td>輔導</td></tr>
                    <tr><td>4</td><td>班會</td><td>英文</td><td>化學</td><td>國文</td><td>輔導</td></tr>
                    <tr><td>5</td><td>體育</td><td>國文</td><td>物理</td><td>深廣</td><td>班會</td></tr>
                    <tr><td>6</td><td>音樂</td><td>國文</td><td>體育</td><td>深廣</td><td>國防</td></tr>
                    <tr><td>7</td><td>英文</td><td>英文</td><td>社團</td><td>英文</td><td>數學</td></tr>
                </table>
            </div>

            <div class="glass-card">
                <div class="section-header"><h2>假別比例</h2></div>
                <div class="chart-container">
                    <div class="chart-legend">
                        <div class="legend-item"><div class="legend-color" style="background: var(--personal-color);"></div><span id="personalCount">事假: 0 節</span></div>
                        <div class="legend-item"><div class="legend-color" style="background: var(--sick-color);"></div><span id="sickCount">病假: 0 節</span></div>
                    </div>
                    <div class="pie-chart" id="pieChart"></div>
                </div>
            </div>

            <div class="glass-card" style="flex-grow: 1; overflow: hidden;">
                <div class="section-header"><h2>戰情分析</h2></div>
                <div class="scrollable-content" id="subjectsContainer"></div>
            </div>
        </div>

    </div>

    <script>
        // --- 日夜模式切換邏輯 V14.0 ---
        const toggleBtn = document.getElementById('modeToggle');
        const bodyObj = document.body;

        // 讀取暫存設定，預設改為 'dark'
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') {
            bodyObj.classList.remove('dark-mode');
        } else {
            // 如果是 dark 或 null(初次進入)，確保加上 dark-mode
            bodyObj.classList.add('dark-mode'); 
        }

        toggleBtn.addEventListener('click', () => {
            bodyObj.classList.toggle('dark-mode');
            let theme = 'light';
            if (bodyObj.classList.contains('dark-mode')) {
                theme = 'dark';
            }
            localStorage.setItem('theme', theme);
            updateChartAndStats(getUserLeaves()); 
        });


        // --- 原有系統邏輯 ---
        function updateClock() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const dayStr = days[now.getDay()];
            
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('realTimeClock').innerText = `${hh}:${mm}:${ss}`;
            document.getElementById('realTimeDate').innerText = `${y}年${m}月${d}日 星期${dayStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const schoolData = {
            "semester": {
                "startDate": "2026-01-21", "endDate": "2026-06-30",
                "holidays": ["2026-02-27", "2026-04-03", "2026-04-06", "2026-05-01", "2026-06-19"],
                "oldScheduleDates": ["2026-01-21", "2026-01-22", "2026-01-23", "2026-02-23", "2026-02-24", "2026-02-25", "2026-02-26"]
            },
            "schedules": {
                "old": {
                    "Monday":    { "1": "物理", "2": "健護", "3": "化學", "4": "班會", "5": "體育", "6": "英文", "7": "音樂" },
                    "Tuesday":   { "1": "數學", "2": "音樂", "3": "物理", "4": "英文", "5": "國文", "6": "國文", "7": "英文" },
                    "Wednesday": { "1": "科技應用", "2": "科技應用", "3": "數學", "4": "化學", "5": "物理", "6": "體育", "7": "社團" },
                    "Thursday":  { "1": "數學", "2": "化學", "3": "物理", "4": "國文", "5": "深廣", "6": "深廣", "7": "英文" },
                    "Friday":    { "1": "國文", "2": "化學", "3": "輔導", "4": "輔導", "5": "班會", "6": "國防", "7": "數學" }
                },
                "new": {
                    "Monday":    { "1": "物理", "2": "健護", "3": "化學", "4": "班會", "5": "體育", "6": "音樂", "7": "英文" },
                    "Tuesday":   { "1": "數學", "2": "音樂", "3": "物理", "4": "英文", "5": "國文", "6": "國文", "7": "英文" },
                    "Wednesday": { "1": "科技應用", "2": "科技應用", "3": "數學", "4": "化學", "5": "物理", "6": "體育", "7": "社團" },
                    "Thursday":  { "1": "數學", "2": "化學", "3": "物理", "4": "國文", "5": "深廣", "6": "深廣", "7": "英文" },
                    "Friday":    { "1": "國文", "2": "化學", "3": "輔導", "4": "輔導", "5": "班會", "6": "國防", "7": "數學" }
                }
            },
            "overrides": [
                { "date": "2026-03-03", "period": "1", "newSubject": "物理" },
                { "date": "2026-03-04", "period": "5", "newSubject": "數學" }
            ]
        };

        let dailyScheduleMap = {}; 
        let baseSubjectStats = {};
        let editingIndex = -1;
        let currentPiePct = 0; 

        function parseLocalDate(dateStr) {
            const parts = dateStr.split('-');
            return new Date(parts[0], parts[1] - 1, parts[2]);
        }

        function formatLocalDate(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function renderOverrides() {
            const container = document.getElementById('overridesContainer');
            if (!schoolData.overrides || schoolData.overrides.length === 0) {
                container.innerHTML = '<div style="text-align:center; color: var(--text-muted); padding-top: 10px; font-size: 0.85rem;">目前無調課紀錄</div>';
                return;
            }
            
            let html = '';
            schoolData.overrides.forEach(ov => {
                html += `
                    <div class="override-item">
                        <span>${ov.date} (第 ${ov.period} 節)</span>
                        <strong>${ov.newSubject}</strong>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function generateCalendar() {
            const { semester, schedules, overrides } = schoolData;
            const startDate = parseLocalDate(semester.startDate);
            const endDate = parseLocalDate(semester.endDate);
            const daysMap = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            
            const overrideMap = {};
            overrides.forEach(ov => overrideMap[`${ov.date}_${ov.period}`] = ov.newSubject);

            baseSubjectStats = {};
            dailyScheduleMap = {};

            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                const dateStr = formatLocalDate(d); 
                const dayOfWeek = d.getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6 || semester.holidays.includes(dateStr)) continue;

                const isOldSchedule = semester.oldScheduleDates.includes(dateStr);
                const currentSchedule = isOldSchedule ? schedules.old : schedules.new;
                const dailyClasses = currentSchedule[daysMap[dayOfWeek]];

                dailyScheduleMap[dateStr] = {};

                for (let period = 1; period <= 7; period++) {
                    let subject = dailyClasses[period.toString()];
                    const overrideKey = `${dateStr}_${period}`;
                    if (overrideMap[overrideKey]) subject = overrideMap[overrideKey];

                    if (subject) {
                        dailyScheduleMap[dateStr][period.toString()] = subject;
                        if (!baseSubjectStats[subject]) {
                            baseSubjectStats[subject] = { totalPeriods: 0, leavesTaken: 0 };
                        }
                        baseSubjectStats[subject].totalPeriods++;
                    }
                }
            }
        }

        function getUserLeaves() { 
            let current = localStorage.getItem('myLeavesV4');
            if (!current) {
                let oldData = localStorage.getItem('myLeavesV2') || localStorage.getItem('myLeaves');
                if (oldData) {
                    current = oldData;
                    localStorage.setItem('myLeavesV4', current);
                }
            }
            return current ? JSON.parse(current) : []; 
        }

        function saveUserLeaves(leaves) {
            leaves.sort((a, b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem('myLeavesV4', JSON.stringify(leaves));
        }

        function animatePieChart(startPct, endPct, total) {
            const chart = document.getElementById('pieChart');
            const trackColor = getComputedStyle(document.documentElement).getPropertyValue('--progress-track-bg');
            if (total === 0) {
                chart.style.background = `conic-gradient(${trackColor} 0% 100%)`;
                currentPiePct = 0;
                return;
            }

            const duration = 600; 
            const startTime = performance.now();

            function step(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3); 
                const current = startPct + (endPct - startPct) * ease;
                
                chart.style.background = `conic-gradient(var(--personal-color) 0% ${current}%, var(--sick-color) ${current}% 100%)`;
                
                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    currentPiePct = endPct; 
                }
            }
            requestAnimationFrame(step);
        }

        function updateChartAndStats(userLeaves) {
            let personalCount = 0; let sickCount = 0;
            userLeaves.forEach(leave => {
                const type = leave.type || '事假';
                if (type === '事假') personalCount += leave.periods.length;
                else if (type === '病假') sickCount += leave.periods.length;
            });
            document.getElementById('personalCount').innerText = `事假: ${personalCount} 節`;
            document.getElementById('sickCount').innerText = `病假: ${sickCount} 節`;

            const total = personalCount + sickCount;
            const targetPct = (total === 0) ? 0 : (personalCount / total) * 100;
            
            animatePieChart(currentPiePct, targetPct, total);
        }

        function renderDashboard() {
            const userLeaves = getUserLeaves();
            let currentStats = JSON.parse(JSON.stringify(baseSubjectStats));
            let totalLeavesAny = 0;

            userLeaves.forEach(leave => {
                let standardDate = leave.date;
                if (standardDate.includes('/')) {
                    const parts = standardDate.split('/');
                    standardDate = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
                }

                const daySchedule = dailyScheduleMap[standardDate];
                if (daySchedule) {
                    leave.periods.forEach(p => {
                        const subject = daySchedule[p.toString()];
                        if (subject && currentStats[subject]) {
                            currentStats[subject].leavesTaken++;
                            totalLeavesAny++;
                        }
                    });
                }
            });

            let statsArray = Object.keys(currentStats).map(subject => {
                const data = currentStats[subject];
                const threshold = Math.floor(data.totalPeriods / 3);
                const remaining = threshold - data.leavesTaken;
                const percentUsed = threshold > 0 ? (data.leavesTaken / threshold) * 100 : 0;
                return { subject, totalPeriods: data.totalPeriods, threshold, leavesTaken: data.leavesTaken, remaining, percentUsed };
            });

            if (totalLeavesAny === 0) statsArray.sort((a, b) => b.totalPeriods - a.totalPeriods);
            else {
                statsArray.sort((a, b) => {
                    if (b.percentUsed !== a.percentUsed) return b.percentUsed - a.percentUsed;
                    if (a.remaining !== b.remaining) return a.remaining - b.remaining;
                    return b.totalPeriods - a.totalPeriods;
                });
            }

            const container = document.getElementById('subjectsContainer');
            container.innerHTML = '';

            statsArray.forEach(data => {
                let colorClass = 'var(--safe-green)';
                if (data.percentUsed >= 80) colorClass = 'var(--danger-red)';
                else if (data.percentUsed >= 50) colorClass = 'var(--warn-yellow)';

                const html = `
                    <div class="subject-item">
                        <div class="subject-header">
                            <strong>${data.subject}</strong>
                            <span>剩 ${data.remaining} (已用 ${data.leavesTaken}/${data.threshold})</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${Math.min(data.percentUsed, 100)}%; background-color: ${colorClass};"></div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function renderHistory() {
            const userLeaves = getUserLeaves();
            const container = document.getElementById('historyContainer');
            const batchActions = document.getElementById('batchActions');
            container.innerHTML = '';

            if (userLeaves.length === 0) {
                batchActions.style.display = 'none';
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-title">目前無資料</div>
                        <div class="empty-state-desc">
                            <strong>你知道嗎？</strong><br><br>
                            根據教育部規定，單一科目缺課達該學期授課總節數的 <span class="highlight-danger">1/3</span>，該科成績將以<span class="highlight-danger">零分</span>計算。<br><br>
                            請由左側開始登記你的請假紀錄，右側戰情分析將會自動為您計算每科的安全額度！
                        </div>
                    </div>
                `;
                return;
            }

            batchActions.style.display = 'flex';
            document.getElementById('selectAllHistory').checked = false;

            userLeaves.forEach((leave, index) => {
                const sortedPeriods = [...leave.periods].sort((a, b) => parseInt(a) - parseInt(b));
                const typeText = leave.type || '事假';
                const typeColor = typeText === '事假' ? 'var(--personal-color)' : 'var(--sick-color)';
                const borderStyle = `border: 1.5px solid ${typeColor}; color: ${typeColor};`;
                const periodsHtml = sortedPeriods.map(p => `<span class="period-badge">第 ${p} 節</span>`).join('');

                container.innerHTML += `
                    <div class="history-item" id="history-row-${index}" onclick="toggleHistoryRow(${index})">
                        <input type="checkbox" class="history-cb" id="cb-${index}" value="${index}" style="display:none;">
                        
                        <div class="history-header">
                            <div class="history-title">
                                ${leave.date} <span class="tag" style="${borderStyle}">${typeText}</span>
                            </div>
                            <div class="history-actions">
                                <button class="text-btn edit" onclick="event.stopPropagation(); editLeave(${index})">修改</button>
                                <button class="text-btn delete" onclick="event.stopPropagation(); deleteLeave(${index})">刪除</button>
                            </div>
                        </div>
                        <div class="history-periods">
                            ${periodsHtml}
                        </div>
                    </div>
                `;
            });
        }

        function toggleAllPeriods(checkbox) {
            const cbs = document.querySelectorAll('.period-cb');
            cbs.forEach(cb => cb.checked = checkbox.checked);
        }

        document.addEventListener('change', function(e) {
            if(e.target && e.target.classList.contains('period-cb')) {
                const allCbs = document.querySelectorAll('.period-cb');
                const checkedCbs = document.querySelectorAll('.period-cb:checked');
                document.getElementById('selectAll').checked = (allCbs.length === checkedCbs.length);
            }
        });

        function toggleHistoryRow(index) {
            const cb = document.getElementById(`cb-${index}`);
            const row = document.getElementById(`history-row-${index}`);
            cb.checked = !cb.checked;
            
            if (cb.checked) row.classList.add('selected');
            else row.classList.remove('selected');
            
            checkHistorySelection();
        }

        function toggleAllHistory(checkbox) {
            const cbs = document.querySelectorAll('.history-cb');
            cbs.forEach(cb => {
                cb.checked = checkbox.checked;
                const row = document.getElementById(`history-row-${cb.value}`);
                if (checkbox.checked) row.classList.add('selected');
                else row.classList.remove('selected');
            });
        }

        function checkHistorySelection() {
            const allCbs = document.querySelectorAll('.history-cb');
            const checkedCbs = document.querySelectorAll('.history-cb:checked');
            document.getElementById('selectAllHistory').checked = (allCbs.length > 0 && allCbs.length === checkedCbs.length);
        }

        function deleteSelectedHistory() {
            const checkedCbs = document.querySelectorAll('.history-cb:checked');
            if (checkedCbs.length === 0) return alert("請先選取要刪除的紀錄");
            if (!confirm(`確定要刪除選取的 ${checkedCbs.length} 筆紀錄嗎？`)) return;

            let userLeaves = getUserLeaves();
            const indicesToDelete = Array.from(checkedCbs).map(cb => parseInt(cb.value, 10)).sort((a, b) => b - a);
            
            indicesToDelete.forEach(index => {
                userLeaves.splice(index, 1);
            });

            saveUserLeaves(userLeaves);
            updateAll();
        }

        function submitLeave() {
            const dateInput = document.getElementById('leaveDate').value;
            const typeInput = document.getElementById('leaveType').value;

            if (!dateInput) return alert("請選擇日期");
            const selectedPeriods = Array.from(document.querySelectorAll('.period-cb:checked')).map(cb => parseInt(cb.value, 10));
            if (selectedPeriods.length === 0) return alert("請至少選取一節課");

            let userLeaves = getUserLeaves();
            if (editingIndex > -1) {
                userLeaves[editingIndex] = { date: dateInput, type: typeInput, periods: selectedPeriods };
                editingIndex = -1;
                document.getElementById('formTitle').innerText = '登記請假紀錄';
                document.getElementById('submitBtn').innerText = '送出資料';
                document.getElementById('cancelBtn').style.display = 'none';
            } else {
                userLeaves.push({ date: dateInput, type: typeInput, periods: selectedPeriods });
            }

            saveUserLeaves(userLeaves);
            resetForm();
            updateAll();
        }

        function deleteLeave(index) {
            if (!confirm("確定要刪除這筆紀錄嗎？")) return;
            let userLeaves = getUserLeaves();
            userLeaves.splice(index, 1);
            saveUserLeaves(userLeaves);
            updateAll();
        }

        function editLeave(index) {
            const userLeaves = getUserLeaves();
            const leave = userLeaves[index];
            
            let standardDate = leave.date;
            if (standardDate.includes('/')) {
                const parts = standardDate.split('/');
                standardDate = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
            }

            document.getElementById('leaveDate').value = standardDate;
            document.getElementById('leaveType').value = leave.type || '事假';
            const cbs = document.querySelectorAll('.period-cb');
            cbs.forEach(cb => { cb.checked = leave.periods.includes(parseInt(cb.value, 10)) || leave.periods.includes(String(cb.value)); });
            document.getElementById('selectAll').checked = leave.periods.length === 7;

            editingIndex = index;
            document.getElementById('formTitle').innerText = '修改紀錄';
            document.getElementById('submitBtn').innerText = '儲存修改';
            document.getElementById('cancelBtn').style.display = 'block';
        }

        function cancelEdit() {
            editingIndex = -1;
            document.getElementById('formTitle').innerText = '登記請假紀錄';
            document.getElementById('submitBtn').innerText = '送出資料';
            document.getElementById('cancelBtn').style.display = 'none';
            resetForm();
        }

        function resetForm() {
            const today = formatLocalDate(new Date());
            const minDate = "2026-01-21";
            const maxDate = "2026-06-30";
            if (today < minDate) document.getElementById('leaveDate').value = minDate;
            else if (today > maxDate) document.getElementById('leaveDate').value = maxDate;
            else document.getElementById('leaveDate').value = today;

            document.getElementById('leaveType').value = '事假';
            document.getElementById('selectAll').checked = false;
            const cbs = document.querySelectorAll('.period-cb');
            cbs.forEach(cb => cb.checked = false);
        }

        function updateAll() {
            const userLeaves = getUserLeaves();
            renderOverrides(); 
            renderDashboard();
            renderHistory();
            updateChartAndStats(userLeaves);
        }

        window.onload = () => {
            generateCalendar();
            resetForm();
            updateAll();
        };
    </script>
</body>
</html>
